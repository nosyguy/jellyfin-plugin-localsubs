name: Build Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish
      run: dotnet publish Jellyfin.Plugin.LocalSubs/Jellyfin.Plugin.LocalSubs.csproj --configuration Release --output ./publish_output

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-LocalSubs-Plugin
        path: ./publish_output/Jellyfin.Plugin.LocalSubs.dll
