name: '🏗️ Build Plugin'

on:
  push:
    branches:
      - main
      - jellyfin-10.9.x
      - jellyfin-10.10.x
      - jellyfin-10.11.x
      - jellyfin-10.12.x
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
      - jellyfin-10.9.x
      - jellyfin-10.10.x
      - jellyfin-10.11.x
      - jellyfin-10.12.x
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "8.0.*"
      dotnet-target: "net8.0"
